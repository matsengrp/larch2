name: Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - vulkan: "OFF"
            suffix: ""
          - vulkan: "ON"
            suffix: "-vulkan"

    steps:
      - uses: actions/checkout@v4

      - name: Install gcc-trunk
        run: |
          wget --quiet https://kayari.org/gcc-latest/gcc-latest.deb
          sudo dpkg -i gcc-latest.deb

      - name: Install dependencies
        run: sudo apt-get install -y zlib1g-dev

      - name: Install Vulkan SDK
        if: matrix.vulkan == 'ON'
        run: |
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc | \
            sudo tee /etc/apt/trusted.gpg.d/lunarg.asc
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-noble.list \
            https://packages.lunarg.com/vulkan/lunarg-vulkan-noble.list
          sudo apt-get update
          sudo apt-get install -y vulkan-sdk

      - name: Configure
        run: |
          cmake -B build \
            -DGCC_TOOLCHAIN=/opt/gcc-latest \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_VULKAN=${{ matrix.vulkan }}

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Run tests
        run: ctest --test-dir build --output-on-failure -E 'vulkan_compute_test|nn_inference_test'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: larch2${{ matrix.suffix }}-linux-x86_64
          path: |
            build/larch2
            build/dagutil
