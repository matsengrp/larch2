name: Release

on:
  workflow_dispatch:

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install gcc-trunk
        run: |
          wget --quiet https://kayari.org/gcc-latest/gcc-latest.deb
          sudo dpkg -i gcc-latest.deb

      - name: Install dependencies
        run: sudo apt-get install -y zlib1g-dev

      - name: Configure
        run: |
          cmake -B build \
            -DGCC_TOOLCHAIN=/opt/gcc-latest \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: Prepare release artifact
        run: cp build/larch2 larch2-linux-x86_64

      - name: Get version info
        id: version
        run: |
          VERSION=$(grep 'project(larch2 VERSION' CMakeLists.txt | grep -oP '\d+\.\d+\.\d+')
          COMMIT_SHORT=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y%m%d)
          echo "tag=v${VERSION}-${DATE}-${COMMIT_SHORT}" >> "$GITHUB_OUTPUT"
          echo "name=larch2 v${VERSION} ${DATE} (${COMMIT_SHORT})" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          body: |
            Automated release from main branch.
            Commit: ${{ github.sha }}
          files: larch2-linux-x86_64
